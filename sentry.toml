# Reth Sentry Node Configuration

[network]
# Ethereum chain ID (1 = mainnet, 11155111 = sepolia)
chain_id = 1
# Maximum number of P2P peers
max_peers = 50
# P2P TCP listen port
p2p_port = 30303
# Discovery UDP port
discovery_port = 30303
# Number of recent blocks to cache for peer requests (persisted to disk)
block_cache_size = 256

[backend]
# Backend node RPC endpoints to forward validated transactions to
# (via eth_sendRawTransaction). Leave empty if using WebSocket only.
endpoints = []
# Maximum concurrent forwarding requests
max_concurrent = 64
# Buffer size for pending transaction forwards
buffer_size = 4096

[backend.dedup]
# LRU cache size for tx hash deduplication
cache_size = 100000
# Log dedup statistics every N transactions
log_interval = 1000

[websocket]
# Enable WebSocket server for pending tx streaming
enabled = true
# Bind address
addr = "0.0.0.0"
# WebSocket listen port
port = 8546
# Broadcast channel capacity
capacity = 4096
